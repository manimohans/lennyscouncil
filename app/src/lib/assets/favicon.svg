<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <title>Lenny's Council</title>
  <!-- Five voices in council. Topmost = synthesis (larger). The others,
       spaced at 72°, form the table. Works from 16px to poster size. -->
  <circle cx="32" cy="11" r="6.5" fill="#ff6b1a"/>
  <circle cx="52" cy="26" r="4.5" fill="#ff6b1a" fill-opacity="0.9"/>
  <circle cx="44" cy="50" r="4.5" fill="#ff6b1a" fill-opacity="0.9"/>
  <circle cx="20" cy="50" r="4.5" fill="#ff6b1a" fill-opacity="0.9"/>
  <circle cx="12" cy="26" r="4.5" fill="#ff6b1a" fill-opacity="0.9"/>
</svg>
